<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Potato (1997) — remake web</title>
<style>
  html, body { margin: 0; background: #0a0a12; color: #eee; font-family: monospace; min-height: 100%; display: flex; align-items: center; justify-content: center; flex-direction: column; overscroll-behavior: none; }
  #status { margin-bottom: 12px; color: #f5821f; }
  h1 { font-size: 14px; letter-spacing: 2px; opacity: .6; }
  #game-container { position: relative; width: 960px; height: 600px; max-width: 100vw; }
  #screen { image-rendering: pixelated; width: 100%; height: 100%; border: 4px solid #333; background: #000; box-sizing: border-box; display: block; }

  /* Overlay de controles táctiles: invisible y sin efecto salvo en dispositivos táctiles */
  #touch-overlay { position: absolute; inset: 4px; display: none; }
  #touch-overlay.active { display: flex; }
  .touch-zone { flex: 1; display: flex; align-items: flex-end; justify-content: center; padding-bottom: 14px; touch-action: none; user-select: none; -webkit-user-select: none; }
  .touch-hint { font-size: 8vw; color: rgba(255,255,255,0.28); }
  #touch-hint-text { display: none; font-size: 11px; color: #888; margin-top: 8px; text-align: center; max-width: 960px; }

  @media (pointer: coarse) {
    #game-container { width: 100vw; height: calc(100vw * 200 / 320); }
    #touch-hint-text { display: block; }
  }
</style>
</head>
<body>
  <h1>POTATO — 1997 → WEB</h1>
  <div id="status">cargando assets...</div>
  <div id="game-container">
    <canvas id="screen" width="320" height="200"></canvas>
    <div id="touch-overlay">
      <div id="touch-left" class="touch-zone"><span class="touch-hint">◀</span></div>
      <div id="touch-right" class="touch-zone"><span class="touch-hint">▶</span></div>
    </div>
  </div>
  <div id="touch-hint-text">Tocá izquierda/derecha para moverte — doble toque para saltar</div>
  <script src="src/game.js"></script>
  <script src="src/loader.js"></script>
  <script src="src/touch-controls.js"></script>
</body>
</html>
